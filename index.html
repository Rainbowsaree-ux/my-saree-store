<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සාරි විමන - Saree Shop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #fdf2f8; text-align: center; }
        header { background-color: #be185d; color: white; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 15px; width: 250px; padding-bottom: 15px; }
        .card img { width: 100%; border-radius: 10px 10px 0 0; height: 300px; object-fit: cover; }
        .price { color: #be185d; font-weight: bold; font-size: 1.2rem; }
        .buy-btn { background-color: #db2777; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>සාරි විමන Online Store</h1>
</header>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Saree">
        <h3>Red Silk Saree</h3>
        <p class="price">රු. 5,500.00</p>
        <button class="buy-btn" onclick="alert('පේමන්ට් ලින්ක් එක පසුව දාමු')">මිලදී ගන්න</button>
    </div>
</div>

</body>
</html
